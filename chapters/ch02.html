<script>
const API='https://script.google.com/macros/s/AKfycbzFqWUb_TlTxldf0Qd-FKJiQxO_4wnAWlUe_JQT6hQG8VR2rva4hBVH1sH9ZgW_1ie7/exec';
const CH_ID='ch02';

async function load(){
  try{
    const r=await fetch(API+'?action=getResources');
    const all=await r.json();
    const d=all[CH_ID]||{locked:true};
    const content=document.getElementById('chapter-content');

    if(d.locked){
      document.getElementById('chapter-loading').innerHTML='<div style="padding:2rem;text-align:center"><div style="font-size:2rem;margin-bottom:0.75rem">🔒</div><div style="font-weight:600;margin-bottom:0.25rem">Not yet available</div><div style="font-size:0.8rem;color:var(--text-muted)">This chapter will unlock after class.</div></div>';
      return;
    }

    document.getElementById('chapter-loading').style.display='none';
    content.style.display='grid';

    const resources=[
      {key:'notes',icon:'📄',type:'Notes',title:'Class Notes PDF',desc:'All NCERT points, diagrams and PYQ highlights.',label:'Open Notes PDF'},
      {key:'recording',icon:'▶',type:'Recording',title:'Class Recording',desc:'Full recording of the live class.',label:'Watch Recording'},
      {key:'dpp',icon:'📝',type:'DPP',title:'Daily Practice Problems',desc:'Attempt before watching solutions.',label:'Open DPP PDF'},
      {key:'dppSolutions',icon:'🎯',type:'DPP Solutions',title:'Video Solutions',desc:'Detailed walkthrough of every question.',label:'Watch Solutions'},
    ];

    content.innerHTML=resources.map(res=>{
      const link=d[res.key];
      return `
        <div class="card chapter-resource-card">
          <div class="chapter-resource-header">
            <span class="chapter-resource-icon">${res.icon}</span>
            <div>
              <p class="chapter-resource-type">${res.type}</p>
              <p class="chapter-resource-title">${res.title}</p>
            </div>
          </div>
          <p class="chapter-resource-desc">${res.desc}</p>
          ${link
            ? `<a href="${link}" target="_blank" rel="noopener" class="resource-link-btn">${res.icon} ${res.label}</a>`
            : `<span class="resource-link-btn" style="opacity:0.4;cursor:not-allowed;">Coming soon</span>`
          }
        </div>`;
    }).join('');

  }catch(e){
    document.getElementById('chapter-loading').textContent='Failed to load. Please refresh.';
  }
}
load();
</script>
</body>
