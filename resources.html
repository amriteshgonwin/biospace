<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resources — BioSprint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">BioSprint</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="live.html">Live</a></li>
    <li><a href="resources.html" class="active">Resources</a></li>
  </ul>
</nav>

<main class="pt-nav">
  <section class="resources">
    <div class="container">
      <p class="section-label">All Materials</p>
      <h1 class="section-title">Resources</h1>
      <p class="section-sub">Chapters unlock after class. Click any open chapter to access notes, recordings, and DPP.</p>

      <div id="chapters-loading" style="text-align:center;padding:3rem;color:var(--text-muted);font-size:0.85rem;">
        Loading chapters...
      </div>

      <div class="chapters-grid" id="chapters-grid" style="display:none;"></div>
    </div>
  </section>
</main>

<footer>
  &copy; 2026 BioSprint &mdash; NEET Biology 20-Day Sprint. All rights reserved.
</footer>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzFqWUb_TlTxldf0Qd-FKJiQxO_4wnAWlUe_JQT6hQG8VR2rva4hBVH1sH9ZgW_1ie7/exec';

const CHAPTERS = [
  {id:'ch01',name:'The Living World'},{id:'ch02',name:'Biological Classification'},
  {id:'ch03',name:'Plant Kingdom'},{id:'ch04',name:'Animal Kingdom'},
  {id:'ch05',name:'Morphology of Flowering Plants'},{id:'ch06',name:'Anatomy of Flowering Plants'},
  {id:'ch07',name:'Structural Organisation of Animals'},{id:'ch08',name:'Cell: The Unit of Life'},
  {id:'ch09',name:'Biomolecules'},{id:'ch10',name:'Cell Cycle and Cell Division'},
  {id:'ch11',name:'Photosynthesis in Higher Plants'},{id:'ch12',name:'Respiration in Plants'},
  {id:'ch13',name:'Plant Growth and Development'},{id:'ch14',name:'Breathing and Exchange of Gases'},
  {id:'ch15',name:'Body Fluids and Circulation'},{id:'ch16',name:'Excretory Products and Their Elimination'},
  {id:'ch17',name:'Locomotion and Movement'},{id:'ch18',name:'Neural Control and Coordination'},
  {id:'ch19',name:'Chemical Control and Integration'},
];

async function loadResources() {
  try {
    const r = await fetch(API + '?action=getResources');
    const data = await r.json();

    const grid = document.getElementById('chapters-grid');
    grid.innerHTML = CHAPTERS.map((ch, i) => {
      const d = data[ch.id] || { locked: true, notes: '', recording: '', dpp: '', dppSolutions: '' };
      const num = String(i + 1).padStart(2, '0');

      if (d.locked) {
        return `
          <div class="chapter-card chapter-card-locked">
            <span class="chapter-num">${num}</span>
            <div class="chapter-info">
              <div class="chapter-name">${ch.name}</div>
              <div class="chapter-tags"><span class="ch-tag ch-tag-locked">🔒 Not yet available</span></div>
            </div>
          </div>`;
      }

      const tags = [
        d.notes ? '<span class="ch-tag">📄 Notes</span>' : '',
        d.recording ? '<span class="ch-tag">▶ Recording</span>' : '',
        d.dpp ? '<span class="ch-tag">📝 DPP</span>' : '',
        d.dppSolutions ? '<span class="ch-tag">🎯 Solutions</span>' : '',
      ].filter(Boolean).join('');

      return `
        <a href="chapters/${ch.id}.html?data=${encodeURIComponent(JSON.stringify(d))}" class="chapter-card">
          <span class="chapter-num">${num}</span>
          <div class="chapter-info">
            <div class="chapter-name">${ch.name}</div>
            <div class="chapter-tags">${tags || '<span class="ch-tag">Coming soon</span>'}</div>
          </div>
          <span class="chapter-arrow">→</span>
        </a>`;
    }).join('');

    document.getElementById('chapters-loading').style.display = 'none';
    grid.style.display = 'flex';
    grid.style.flexDirection = 'column';
    grid.style.gap = '0.5rem';
    grid.style.marginTop = '2rem';

  } catch(e) {
    document.getElementById('chapters-loading').textContent = 'Failed to load. Please refresh.';
  }
}

loadResources();
</script>

<style>
.chapter-card-locked {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}
.ch-tag-locked {
  color: var(--red) !important;
  border-color: rgba(255,69,69,0.2) !important;
}
</style>

</body>
</html>
